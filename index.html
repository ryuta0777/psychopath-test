<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>10問サイコパス診断 あなたの危険度は？</title>
<style>
  :root{--bg:#0f1724;--card:#0b1220;--accent:#ffb86b;--muted:#9aa4b2;--white:#eef2f7}
  html,body{height:100%}
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:linear-gradient(180deg,#071021 0%,#0b1220 100%);color:var(--white);display:flex;align-items:center;justify-content:center;padding:20px}
  .wrap{width:100%;max-width:520px;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));border-radius:14px;padding:18px;box-shadow:0 6px 30px rgba(2,6,23,0.6)}
  .title{font-size:18px;font-weight:700;margin:0 0 8px}
  .desc{color:var(--muted);font-size:13px;margin:0 0 14px}
  .progress{height:10px;background:rgba(255,255,255,0.06);border-radius:999px;overflow:hidden;margin-bottom:14px}
  .progress > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),#ffd9b3);width:0%;transition:width .35s ease}
  .card{background:rgba(255,255,255,0.02);padding:14px;border-radius:10px}
  .qnum{font-size:12px;color:var(--muted);margin-bottom:6px}
  .qtext{font-size:16px;margin-bottom:12px}
  .choices{display:flex;gap:8px;flex-wrap:wrap}
  .choice{flex:1 1 48%;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.03);padding:10px;border-radius:8px;text-align:center;cursor:pointer;user-select:none}
  .choice.selected{background:linear-gradient(180deg,rgba(255,184,107,0.12),rgba(255,184,107,0.06));border-color:rgba(255,184,107,0.25)}
  .nav{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
  .btn{background:var(--accent);color:#111;padding:8px 12px;border-radius:8px;border:none;font-weight:700;cursor:pointer}
  .btn.ghost{background:transparent;color:var(--white);border:1px solid rgba(255,255,255,0.06)}
  .result{padding:12px;margin-top:12px;border-radius:10px;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01))}
  .score{font-size:20px;font-weight:800;color:var(--accent);margin:6px 0}
  .share{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
  .small{font-size:12px;color:var(--muted)}
  .platform{flex:1 1 48%;padding:8px;border-radius:8px;background:rgba(255,255,255,0.02);text-align:center;cursor:pointer;border:1px solid rgba(255,255,255,0.03)}
  @media (max-width:420px){
    .choice{flex-basis:100%}
    .platform{flex-basis:48%}
    .wrap{padding:14px}
  }
</style>
</head>
<body>
<div class="wrap" role="application" aria-label="サイコパス診断アプリ">
  <div class="title">10問サイコパス診断</div>
  <div class="desc">あなたの危険度は？ 直感で答えてね。結果はSNSでシェアできます。</div>

  <div class="progress" aria-hidden="true"><i id="bar"></i></div>

  <div class="card" id="card">
    <div class="qnum" id="qnum">質問 1 / 10</div>
    <div class="qtext" id="qtext">読み込み中...</div>

    <div class="choices" id="choices"></div>

    <div class="nav">
      <button class="btn ghost" id="prevBtn" aria-label="前の質問">戻る</button>
      <button class="btn" id="nextBtn" aria-label="次の質問">次へ</button>
    </div>
  </div>

  <div id="resultArea" style="display:none" class="result" aria-live="polite">
    <div class="small">診断結果</div>
    <div class="score" id="scoreText">0</div>
    <div id="resultText" class="small">ここに結果の説明が入ります。</div>

    <div class="small" style="margin-top:8px">共有する</div>
    <div class="share" id="shareButtons">
      <div class="platform" id="shareNative">スマホ共有</div>
      <div class="platform" id="lineBtn">LINE</div>
      <div class="platform" id="xBtn">X（旧Twitter）</div>
      <div class="platform" id="threadsBtn">Threads</div>
      <div class="platform" id="instagramBtn">Instagram</div>
      <div class="platform" id="tiktokBtn">TikTok</div>
      <div class="platform" id="facebookBtn">Facebook</div>
      <div class="platform" id="copyBtn">結果をコピー</div>
    </div>

    <div style="display:flex;gap:8px;margin-top:10px">
      <button class="btn ghost" id="retryBtn">もう一度</button>
    </div>
  </div>
</div>

<script>
/*
  変更点：
  - タイトルを「10問サイコパス診断 あなたの危険度は？」に設定
  - 結果表示を「30点満点中 XX点」形式に変更（10問×最大3点＝30点満点）
  - 共有ボタンを追加：LINE、X、Threads、Instagram、TikTok、Facebook、スマホネイティブ共有、コピー
*/

const MAX_SCORE = 30;

const questions = [
  "他人の感情に共感するのが苦手だと感じることがある。",
  "ルールや法律を破っても罪悪感が薄い方だ。",
  "自分の利益のためなら嘘をつくことがある。",
  "他人を操作して自分の目的を達成することがある。",
  "短期的な刺激やスリルを求める傾向が強い。",
  "失敗や批判を受けてもあまり気にしない。",
  "他人の痛みを見ても冷静でいられることがある。",
  "責任を取るよりも言い訳をすることが多い。",
  "人間関係を浅く保つ方が楽だと感じる。",
  "他人の評価より自分の欲求を優先することが多い。"
];

let answers = new Array(questions.length).fill(null);
let idx = 0;

const qnum = document.getElementById('qnum');
const qtext = document.getElementById('qtext');
const choices = document.getElementById('choices');
const bar = document.getElementById('bar');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const resultArea = document.getElementById('resultArea');
const scoreText = document.getElementById('scoreText');
const resultText = document.getElementById('resultText');

function renderQuestion(i){
  qnum.textContent = `質問 ${i+1} / ${questions.length}`;
  qtext.textContent = questions[i];
  choices.innerHTML = '';
  const labels = [
    "当てはまらない",
    "やや当てはまる",
    "かなり当てはまる",
    "非常に当てはまる"
  ];
  for(let v=0;v<4;v++){
    const btn = document.createElement('div');
    btn.className = 'choice';
    btn.tabIndex = 0;
    btn.setAttribute('role','button');
    btn.setAttribute('data-value',v);
    btn.innerHTML = `<div style="font-size:13px">${labels[v]}</div>`;
    if(answers[i] === v) btn.classList.add('selected');
    btn.addEventListener('click', ()=> selectChoice(i,v));
    btn.addEventListener('keydown', (e)=>{ if(e.key==='Enter') selectChoice(i,v) });
    choices.appendChild(btn);
  }
  updateNav();
  updateProgress();
}

function selectChoice(qIndex, val){
  answers[qIndex] = val;
  renderQuestion(qIndex);
}

function updateNav(){
  prevBtn.disabled = idx === 0;
  nextBtn.textContent = idx === questions.length -1 ? '診断する' : '次へ';
}

function updateProgress(){
  const pct = Math.round(((idx) / (questions.length)) * 100);
  bar.style.width = `${pct}%`;
}

prevBtn.addEventListener('click', ()=>{
  if(idx>0){ idx--; renderQuestion(idx); }
});

nextBtn.addEventListener('click', ()=>{
  if(answers[idx] === null){
    alert('まずは選択肢を選んでください。');
    return;
  }
  if(idx < questions.length -1){
    idx++; renderQuestion(idx);
  } else {
    showResult();
  }
});

function showResult(){
  const missing = answers.some(a=>a===null);
  if(missing){
    if(!confirm('未回答の質問があります。それでも診断しますか？')) return;
  }
  const total = answers.reduce((s,v)=>s + (v===null?0:v),0);
  // スコアは 0〜30（10問×0-3）なのでそのまま表示
  scoreText.textContent = `${total} / ${MAX_SCORE} 点`;
  resultText.textContent = interpretScore(total);
  document.getElementById('card').style.display = 'none';
  resultArea.style.display = 'block';
  bar.style.width = '100%';
  // 更新：共有用テキストを準備
  prepareShareData(total);
}

function interpretScore(s){
  if(s <= 6) return '低リスク：共感や社会的ルールを重視する傾向があります。';
  if(s <= 14) return '中程度：自己中心的な傾向が見られることがあります。注意が必要です。';
  if(s <= 21) return '高め：冷淡さや操作的な行動が出やすい可能性があります。';
  return '非常に高い：専門家の評価が望ましいレベルの傾向が見られます。';
}

/* 共有ロジック */
let shareText = '';
let shareUrl = location.href;

function prepareShareData(total){
  shareText = `10問サイコパス診断：${total} / ${MAX_SCORE}点\n${interpretScore(total)}\nあなたも診断してみてね。`;
}

/* スマホネイティブ共有 */
document.getElementById('shareNative').addEventListener('click', async ()=>{
  if(navigator.share){
    try{
      await navigator.share({title:'10問サイコパス診断', text: shareText, url: shareUrl});
    }catch(e){
      alert('共有がキャンセルされました。');
    }
  } else {
    copyToClipboardFallback();
  }
});

/* LINE */
document.getElementById('lineBtn').addEventListener('click', ()=>{
  const url = `https://line.me/R/msg/text/?${encodeURIComponent(shareText + '\n' + shareUrl)}`;
  window.open(url, '_blank');
});

/* X (旧Twitter) */
document.getElementById('xBtn').addEventListener('click', ()=>{
  const url = `https://x.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${encodeURIComponent(shareUrl)}`;
  window.open(url, '_blank');
});

/* Threads */
document.getElementById('threadsBtn').addEventListener('click', ()=>{
  // Threads は web での事前投稿が限定的なため、テキストをコピーして threads.net を開く挙動にする
  copyToClipboardFallback(true, 'Threads を開きます。貼り付けて投稿してください。');
  window.open('https://www.threads.net/', '_blank');
});

/* Instagram */
document.getElementById('instagramBtn').addEventListener('click', ()=>{
  // Instagram はテキスト投稿の直接URLがないため、コピーしてアプリを開く
  copyToClipboardFallback(true, 'Instagram を開きます。キャプションに貼り付けて投稿してください。');
  window.open('https://www.instagram.com/', '_blank');
});

/* TikTok */
document.getElementById('tiktokBtn').addEventListener('click', ()=>{
  // TikTok も同様にコピーしてアプリへ誘導
  copyToClipboardFallback(true, 'TikTok を開きます。キャプションに貼り付けて投稿してください。');
  window.open('https://www.tiktok.com/', '_blank');
});

/* Facebook */
document.getElementById('facebookBtn').addEventListener('click', ()=>{
  const url = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}&quote=${encodeURIComponent(shareText)}`;
  window.open(url, '_blank');
});

/* コピー */
document.getElementById('copyBtn').addEventListener('click', async ()=>{
  try{
    await navigator.clipboard.writeText(`${shareText}\n${shareUrl}`);
    alert('結果をコピーしました。SNSに貼ってシェアできます。');
  }catch(e){
    copyToClipboardFallback();
  }
});

function copyToClipboardFallback(showOpen=false, msg){
  // フォールバック：テキストを prompt で表示して手動コピーを促す
  const toCopy = `${shareText}\n${shareUrl}`;
  try{
    prompt(msg || '以下をコピーしてSNSに貼ってください。', toCopy);
  }catch(e){
    alert('共有機能が利用できません。結果を手動でコピーしてください。');
  }
}

/* リトライ */
document.getElementById('retryBtn').addEventListener('click', ()=>{
  answers = new Array(questions.length).fill(null);
  idx = 0;
  document.getElementById('card').style.display = 'block';
  resultArea.style.display = 'none';
  renderQuestion(0);
});

// 初期表示
renderQuestion(0);
</script>
</body>
</html>
